    .warning-box strong { color: var(--yellow); }
    .data-preview {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px; margin-bottom: 24px; max-height: 360px; overflow-y: auto;
    }
    .cage-block { margin-bottom: 20px; }
    .cage-title { font-size: 13px; font-weight: 700; color: var(--blue); margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }
    .log-row {
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      padding: 3px 0; border-bottom: 1px solid #21262d; color: var(--text-2);
      display: flex; gap: 12px;
    }
    .log-row .date { color: var(--text); min-width: 80px; }
    .log-row .kind-in { color: var(--blue); min-width: 28px; }
    .log-row .kind-out { color: var(--green); min-width: 28px; }
    .log-row .species { min-width: 36px; }
    .log-row .count { min-width: 56px; text-align: right; }
    .log-row .memo { color: #6e7681; }
    .btn-import {
      background: var(--green); color: #0d1117; border: none; border-radius: 8px;
      padding: 12px 28px; font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif; transition: opacity .15s;
    }
    .btn-import:hover { opacity: .85; }
    .btn-import:disabled { opacity: .4; cursor: not-allowed; }
    #logOutput {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px; margin-top: 20px; max-height: 400px; overflow-y: auto;
      font-family: 'JetBrains Mono', monospace; font-size: 12px; display: none;
    }
    .log-ok { color: var(--green); }
    .log-err { color: var(--red); }
    .log-info { color: var(--text-2); }
    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin: 16px 0; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 2px; width: 0; transition: width .3s; }
    .summary {
      background: #0d2a0d; border: 1px solid var(--green); border-radius: 8px;
      padding: 14px 18px; margin-top: 20px; font-size: 13px; display: none;

// ─── 프리뷰 렌더링 ───────────────────────────────
function renderPreview() {
  const grouped = {};
  for (const log of NOTION_DATA) {
    if (!grouped[log.cageId]) grouped[log.cageId] = [];
    grouped[log.cageId].push(log);
  }
  const el = document.getElementById("dataPreview");
  let html = "";
  for (const cageId of Object.keys(grouped).sort()) {
    html += `<div class="cage-block"><div class="cage-title">${cageId} — ${grouped[cageId].length}건</div>`;
    for (const log of grouped[cageId]) {
      const kindCls = log.kind === "input" ? "kind-in" : "kind-out";
      const kindTxt = log.kind === "input" ? "IN" : "OUT";
      const dateShort = log.date.slice(5,10).replace("-","/");
      html += `<div class="log-row">
        <span class="date">${dateShort}</span>
        <span class="${kindCls}">${kindTxt}</span>
        <span class="species">${log.species}</span>
        <span class="count">${log.count.toLocaleString()}마리</span>
        <span class="memo">${log.memo}</span>
      </div>`;
    }
    html += `</div>`;
  }
  el.innerHTML = html;
}

  function log(msg, cls = "log-info") {
    logEl.innerHTML += `<div class="${cls}">${msg}</div>`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  log(`총 ${total}건 import 시작...`);

  for (let i = 0; i < NOTION_DATA.length; i++) {
    const entry = NOTION_DATA[i];
    try {
      const logsCol = collection(db, "cages", entry.cageId, "logs");
      await addDoc(logsCol, {
        kind: entry.kind,
        date: entry.date,
        species: entry.species,
        count: entry.count,
        memo: entry.memo,
        fromId: null,
        createdAt: new Date().toISOString(),
        _imported: true,
      });
      ok++;
      log(`✓ [${entry.cageId}] ${entry.date.slice(5,10)} ${entry.kind === "input" ? "투입" : "방사"} ${entry.species} ${entry.count}마리`, "log-ok");
    } catch (e) {
      err++;
      log(`✗ [${entry.cageId}] ${entry.date.slice(5,10)} 실패: ${e.message}`, "log-err");
    }
    fill.style.width = `${((i + 1) / total) * 100}%`;
    // 과도한 요청 방지
    if (i % 10 === 9) await new Promise(r => setTimeout(r, 100));
  }

  const summary = document.getElementById("summary");
  summary.style.display = "block";
  summary.innerHTML = `<strong>완료!</strong> 성공 ${ok}건 / 실패 ${err}건<br>
    <span style="color:var(--text-2);font-size:12px">앱으로 돌아가서 각 케이지 로그를 확인하세요.<br>이 페이지는 이제 삭제해도 됩니다.</span>`;

  log(`\n완료 — 성공 ${ok} / 실패 ${err}`, ok === total ? "log-ok" : "log-err");
};

renderPreview();
</script>
</body>
</html>
